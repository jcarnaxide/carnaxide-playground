<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Powder Game 3D — Carnaxide Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --border:    #1e2330;
      --accent:    #5b8cff;
      --accent-dim:#2a3f6e;
      --text:      #e2e6f0;
      --muted:     #5a6075;
      --game-w:    1152px;
      --game-h:    648px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      gap: 1.25rem;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: var(--game-w);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .logo span {
      color: var(--accent);
    }

    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--accent-dim);
      text-transform: uppercase;
    }

    /* ── Game frame ── */
    .game-wrapper {
      position: relative;
      width: 100%;
      max-width: var(--game-w);
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(91, 140, 255, 0.07);
    }

    .game-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Footer ── */
    footer {
      width: 100%;
      max-width: var(--game-w);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
    }

    footer p {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.75rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.05em;
    }

    footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .tag { display: none; }
      footer { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><span>Carnaxide</span> Games</div>
    <div class="tag">Early Demo — v0.2</div>
  </header>

  <main class="game-wrapper">
    <iframe
      src="game/index.html"
      title="Powder Game 3D"
      allowfullscreen
      allow="autoplay"
    ></iframe>
  </main>

  <footer>
    <p>© 2026 Carnaxide Games LLC</p>
    <a href="https://www.youtube.com/@CarnaxideGames" target="_blank" rel="noopener">YouTube → Carnaxide Games</a>
  </footer>

</body>
</html>
